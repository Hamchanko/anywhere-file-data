<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASK MAP — 迷子にならない行動計画</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-black:#0b0b14;
    --panel:#15151f;
    --panel-2:#1c1c2a;
    --line:#2b2b3d;
    --pink:#ff2d78;
    --pink-d:#c2154f;
    --cyan:#00e5c8;
    --cyan-d:#00a88f;
    --lime:#c6ff3d;
    --lime-d:#8fbf1f;
    --purple:#9b4dff;
    --purple-d:#6c2fc9;
    --yellow:#ffe135;
    --yellow-d:#d9b800;
    --coral:#ff6b4a;
    --coral-d:#cc4423;
    --text-light:#f5f5ff;
    --text-dim:#9a9ab0;
    --text-dark:#1a1a22;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--ink-black);
    color:var(--text-light);
    font-family:"Yusei Magic","Fredoka",sans-serif;
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    width:100vw;
    position:relative;
  }

  /* ===== background splash decoration =====
     Individual ink-splat shapes traced out of the user's own artwork and
     rebuilt as SVG vector paths (see the <svg class="bg-splash"> markup
     below) — vector instead of a stretched raster image, so they stay
     sharp at any size. Opacity is set per-shape (all low), since this is a
     background layer and shouldn't compete with the foreground UI. */
  .bg-splash{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }

  /* ===== sidebar ===== */
  .sidebar{
    width:280px;
    min-width:280px;
    background:var(--panel);
    border-right:3px solid var(--line);
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:2;
    overflow:hidden;
    transition:width .22s ease, min-width .22s ease, border-color .22s ease;
  }
  body.sidebar-collapsed .sidebar{
    width:0;
    min-width:0;
    border-right-color:transparent;
  }
  .sidebar-inner{
    width:280px;
    min-width:280px;
    height:100%;
    display:flex;
    flex-direction:column;
  }
  .sidebar-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px 12px 12px 16px;
  }
  .logo-squid{ width:38px; height:38px; flex-shrink:0; }
  .logo-text{
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.03em;
    background:linear-gradient(90deg,var(--pink),var(--cyan));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo-sub{
    font-size:10px;
    color:var(--text-dim);
    letter-spacing:0.08em;
    margin-top:-2px;
  }
  .sidebar-collapse-btn{
    margin-left:auto;
    flex-shrink:0;
    width:28px; height:28px;
    background:var(--panel-2);
    border:2px solid var(--line);
    color:var(--text-light);
    border-radius:50%;
    font-size:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sidebar-collapse-btn:hover{ border-color:var(--cyan); }
  .home-link{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    padding:0;
    margin:0;
    cursor:pointer;
    text-align:left;
    border-radius:10px;
  }
  .home-link:hover{ background:var(--panel-2); }
  .home-link:hover .logo-text{ filter:brightness(1.15); }
  .sidebar-footer{
    padding:10px 16px 16px 16px;
    border-top:2px solid var(--line);
  }
  .delete-all-btn{
    width:100%;
    padding:10px 12px;
    background:transparent;
    border:2px solid var(--line);
    color:var(--text-dim);
    font-family:"Fredoka",sans-serif;
    font-weight:600;
    font-size:13px;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:border-color .12s ease, color .12s ease;
  }
  .delete-all-btn:hover{
    border-color:var(--pink);
    color:var(--pink);
  }
  .sidebar-reopen-btn{
    display:none;
    position:fixed;
    top:14px; left:14px;
    z-index:6;
    width:40px;height:40px;
    background:var(--panel);
    border:2px solid var(--line);
    color:var(--text-light);
    border-radius:50%;
    font-size:16px;
    cursor:pointer;
    align-items:center;
    justify-content:center;
  }
  .sidebar-reopen-btn:hover{ border-color:var(--cyan); }
  body.sidebar-collapsed .sidebar-reopen-btn{ display:flex; }
  .new-task-btn{
    margin:6px 16px 14px 16px;
    padding:13px 14px;
    background:var(--pink);
    border:3px solid var(--text-dark);
    color:#fff;
    font-family:"Fredoka",sans-serif;
    font-weight:600;
    font-size:15px;
    border-radius:22px 30px 26px 34px;
    box-shadow:0 5px 0 var(--pink-d);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .new-task-btn:hover{ filter:brightness(1.08); }
  .new-task-btn:active{
    transform:translateY(5px);
    box-shadow:0 0 0 var(--pink-d);
  }
  .sidebar-section-label{
    padding:4px 18px;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    font-family:"Fredoka",sans-serif;
    font-weight:600;
  }
  .recent-list{
    flex:1;
    overflow-y:auto;
    padding:6px 10px 10px 10px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .recent-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid transparent;
    background:transparent;
  }
  .recent-item:hover{ background:var(--panel-2); }
  .recent-item.active{
    background:var(--panel-2);
    border-color:var(--cyan);
  }
  .recent-dot{
    width:10px;height:10px;border-radius:50%;
    flex-shrink:0;
  }
  .recent-info{ flex:1; min-width:0; }
  .recent-title{
    font-size:14px;
    color:var(--text-light);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .recent-meta{
    font-size:11px;
    color:var(--text-dim);
    font-family:"Fredoka",sans-serif;
  }
  .recent-del{
    opacity:0;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:15px;
    cursor:pointer;
    padding:2px 4px;
    flex-shrink:0;
  }
  .recent-item:hover .recent-del{ opacity:1; }
  .recent-del:hover{ color:var(--pink); }
  .recent-empty{
    color:var(--text-dim);
    font-size:12.5px;
    padding:14px 16px;
    line-height:1.8;
  }

  /* ===== main ===== */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:1;
    min-width:0;
  }
  .topbar{
    padding:18px 28px 14px 28px;
    border-bottom:3px solid var(--line);
    background:var(--panel);
    z-index:2;
  }
  .task-title{
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:24px;
    color:var(--text-light);
    outline:none;
    display:inline-block;
    min-width:2ch;
    border-bottom:2px dashed transparent;
  }
  .task-title:hover, .task-title:focus{ border-bottom-color:var(--cyan); }
  .topbar-meta{
    display:flex;
    align-items:center;
    gap:18px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .progress-wrap{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--text-dim);
    font-family:"Fredoka",sans-serif;
  }
  .progress-bar{
    width:140px;
    height:10px;
    background:var(--panel-2);
    border-radius:6px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--lime),var(--cyan));
    width:0%;
    transition:width .25s ease;
  }
  .current-trail{
    font-size:12.5px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
  }
  .current-trail b{
    color:var(--yellow);
    font-family:"Fredoka",sans-serif;
    font-weight:600;
  }
  .trail-seg{
    color:var(--text-light);
    background:var(--panel-2);
    padding:2px 8px;
    border-radius:8px;
    font-size:12px;
  }

  .canvas-wrap{
    flex:1;
    overflow:auto;
    position:relative;
    padding:40px 30px 80px 30px;
  }

  /* ===== empty state ===== */
  .empty-state{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--text-dim);
    gap:14px;
  }
  .empty-state svg{ width:120px; height:120px; opacity:.8; }
  .empty-state h2{
    font-family:"Fredoka",sans-serif;
    color:var(--text-light);
    font-size:20px;
    margin:0;
  }
  .empty-state p{ font-size:13.5px; margin:0; line-height:1.8; max-width:320px; }

  /* ===== tree ===== */
  .tree, .tree ul{
    list-style:none;
    margin:0;
    padding:24px 6px 0 6px;
    display:flex;
    justify-content:center;
    transform-origin:top center;
  }
  .tree{ padding-top:0; }
  .tree li{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    padding:24px 12px 0 12px;
  }
  .tree li::before, .tree li::after{
    content:'';
    position:absolute;
    top:0; right:50%;
    border-top:3px solid var(--line);
    width:50%; height:24px;
  }
  .tree li::after{ right:auto; left:50%; border-left:3px solid var(--line); }
  .tree li:only-child::after, .tree li:only-child::before{ display:none; }
  .tree li:only-child{ padding-top:0; }
  .tree li:first-child::before{ border:0 none; }
  .tree li:last-child::after{ border:0 none; }
  .tree li:last-child::before{ border-right:3px solid var(--line); border-radius:0 6px 0 0; }
  .tree li:first-child::after{ border-radius:6px 0 0 0; }
  .tree > li{ padding-top:0 !important; }
  .tree > li::before, .tree > li::after{ display:none !important; content:none !important; }
  .tree ul::before{
    content:'';
    position:absolute;
    top:0; left:50%;
    border-left:3px solid var(--line);
    width:0; height:24px;
  }
  .tree li.collapsed > ul{ display:none; }

  .node-wrap{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .node-card{
    position:relative;
    min-width:150px;
    max-width:230px;
    padding:12px 16px;
    border:3px solid var(--text-dark);
    border-radius:22px 30px 26px 34px;
    color:var(--text-dark);
    font-size:14px;
    line-height:1.5;
    cursor:default;
    box-shadow:0 5px 0 rgba(0,0,0,.35);
    word-break:break-word;
    transition:transform .1s ease;
  }
  .node-card:hover{ transform:translateY(-2px); }
  .node-card.done{
    opacity:.55;
    text-decoration:line-through;
  }
  /* "current position" highlight uses box-shadow rings instead of outline:
     outline combined with an asymmetric border-radius blob can make some
     browsers render a self-intersecting corner seam (looked like a stray
     line through the card). box-shadow always follows border-radius
     correctly, so this avoids that class of rendering glitch entirely. */
  .node-card.current{
    box-shadow:0 5px 0 rgba(0,0,0,.35), 0 0 0 3px var(--yellow);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 5px 0 rgba(0,0,0,.35), 0 0 0 3px var(--yellow), 0 0 0 3px rgba(255,225,53,.55); }
    50%{ box-shadow:0 5px 0 rgba(0,0,0,.35), 0 0 0 3px var(--yellow), 0 0 0 12px rgba(255,225,53,0); }
  }
  .node-text{
    outline:none;
    font-family:"Yusei Magic",sans-serif;
  }
  .pin-badge{
    position:absolute;
    top:-14px; right:-10px;
    background:var(--yellow);
    border:2px solid var(--text-dark);
    border-radius:50%;
    width:26px; height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
  }
  .node-actions{
    display:flex;
    gap:5px;
    margin-top:6px;
    opacity:0;
    transition:opacity .12s ease;
  }
  .node-wrap:hover .node-actions{ opacity:1; }
  .node-btn{
    background:var(--panel-2);
    border:2px solid var(--line);
    color:var(--text-light);
    border-radius:8px;
    width:26px; height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    cursor:pointer;
    line-height:1;
  }
  .node-btn:hover{ border-color:var(--cyan); }
  .node-btn.danger:hover{ border-color:var(--pink); color:var(--pink); }
  .collapse-toggle{
    position:absolute;
    bottom:-11px;
    left:50%;
    transform:translateX(-50%);
    width:22px; height:22px;
    background:var(--panel-2);
    border:2px solid var(--line);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    cursor:pointer;
    color:var(--text-light);
  }

  .add-child-input{
    margin-top:10px;
    display:flex;
    gap:4px;
  }
  .add-child-input input{
    width:150px;
    padding:6px 8px;
    border-radius:8px;
    border:2px solid var(--cyan);
    background:var(--panel-2);
    color:var(--text-light);
    font-family:"Yusei Magic",sans-serif;
    font-size:13px;
    outline:none;
  }
  .add-child-input button{
    background:var(--cyan);
    border:2px solid var(--text-dark);
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
    padding:0 10px;
  }

  /* ===== zoom controls ===== */
  .zoom-controls{
    position:fixed;
    right:24px;
    bottom:24px;
    z-index:3;
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:16px;
    padding:6px 8px;
    box-shadow:0 4px 0 rgba(0,0,0,.35);
  }
  .zoom-controls button{
    width:26px; height:26px;
    background:var(--panel-2);
    border:2px solid var(--line);
    color:var(--text-light);
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .zoom-controls button:hover{ border-color:var(--cyan); }
  .zoom-label{
    font-family:"Fredoka",sans-serif;
    font-size:12px;
    color:var(--text-dim);
    min-width:38px;
    text-align:center;
  }

  /* ===== modal ===== */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:var(--panel);
    border:3px solid var(--pink);
    border-radius:24px;
    padding:26px 26px 20px 26px;
    width:340px;
    max-width:90vw;
    box-shadow:0 8px 0 var(--pink-d);
  }
  .modal-box h3{
    margin:0 0 14px 0;
    font-family:"Fredoka",sans-serif;
    font-size:18px;
  }
  .modal-box input{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:2px solid var(--line);
    background:var(--panel-2);
    color:var(--text-light);
    font-family:"Yusei Magic",sans-serif;
    font-size:14px;
    outline:none;
    margin-bottom:16px;
  }
  .modal-box input:focus{ border-color:var(--cyan); }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
  }
  .modal-actions button{
    font-family:"Fredoka",sans-serif;
    font-weight:600;
    font-size:13px;
    padding:9px 16px;
    border-radius:10px;
    border:2px solid var(--text-dark);
    cursor:pointer;
  }
  .btn-cancel{ background:var(--panel-2); color:var(--text-light); border-color:var(--line); }
  .btn-confirm{ background:var(--lime); color:var(--text-dark); box-shadow:0 4px 0 var(--lime-d); }
  .btn-confirm:active{ transform:translateY(4px); box-shadow:none; }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:var(--panel); }
  ::-webkit-scrollbar-thumb{ background:var(--panel-2); border-radius:6px; border:2px solid var(--line); }

  @media (max-width:760px){
    .sidebar{ position:fixed; top:0; left:0; bottom:0; z-index:4; }
    body.sidebar-collapsed .sidebar{ box-shadow:none; }
    body:not(.sidebar-collapsed) .sidebar{ box-shadow:6px 0 20px rgba(0,0,0,.5); }
  }
</style>
</head>
<body>

<!-- Background: 5 ink-splat shapes traced directly from the user's own artwork
     (assets/7c3d6ec0-6218-40fc-ab77-e46432322f12_base_resized.jpg) — each blob's
     outline was extracted from the source image and converted to a smooth SVG
     bezier path, so they're real vector shapes (crisp at any size) rather than a
     stretched raster image. Kept at low opacity since this is a background. -->

<button class="sidebar-reopen-btn" id="sidebarReopenBtn" title="サイドバーを開く">☰</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <button class="home-link" id="homeLink" title="ホームにもどる">
          <svg class="logo-squid" viewBox="0 0 100 100">
            <ellipse cx="50" cy="42" rx="30" ry="26" fill="#ff2d78" stroke="#1a1a22" stroke-width="3"/>
            <path d="M25,55 Q20,80 12,88 Q22,86 28,78 Q30,88 34,92 Q38,84 38,74 Q44,86 50,90 Q54,80 50,70 Q58,84 64,86 Q64,76 60,68 Q68,80 76,82 Q74,68 65,58" fill="#ff2d78" stroke="#1a1a22" stroke-width="3" stroke-linejoin="round"/>
            <circle cx="40" cy="38" r="6" fill="#1a1a22"/>
            <circle cx="62" cy="38" r="6" fill="#1a1a22"/>
            <circle cx="42" cy="36" r="2" fill="#fff"/>
            <circle cx="64" cy="36" r="2" fill="#fff"/>
          </svg>
          <div>
            <div class="logo-text">TASK MAP</div>
            <div class="logo-sub">はぐれない作戦会議</div>
          </div>
        </button>
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="サイドバーを閉じる">«</button>
      </div>

      <button class="new-task-btn" id="newTaskBtn">＋ 新規タスク</button>

      <div class="sidebar-section-label">最近のタスク</div>
      <div class="recent-list" id="recentList"></div>

      <div class="sidebar-footer">
        <button class="delete-all-btn" id="deleteAllBtn">🗑 Delete All</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar" id="topbar" style="display:none;">
      <span class="task-title" id="taskTitle" contenteditable="true" spellcheck="false"></span>
      <div class="topbar-meta">
        <div class="progress-wrap">
          <span id="progressLabel">0 / 0 完了</span>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="current-trail" id="currentTrail"></div>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 100 100">
          <ellipse cx="50" cy="42" rx="30" ry="26" fill="#00e5c8" stroke="#1a1a22" stroke-width="3"/>
          <path d="M25,55 Q20,80 12,88 Q22,86 28,78 Q30,88 34,92 Q38,84 38,74 Q44,86 50,90 Q54,80 50,70 Q58,84 64,86 Q64,76 60,68 Q68,80 76,82 Q74,68 65,58" fill="#00e5c8" stroke="#1a1a22" stroke-width="3" stroke-linejoin="round"/>
          <circle cx="40" cy="38" r="6" fill="#1a1a22"/>
          <circle cx="62" cy="38" r="6" fill="#1a1a22"/>
        </svg>
        <h2>まだタスクがありません</h2>
        <p>左の「＋ 新規タスク」から、達成したいゴールを1つ入力してください。<br>そこから枝を伸ばすように、やることを分解していきましょう。</p>
      </div>
      <ul class="tree" id="treeRoot" style="display:none;"></ul>
    </div>

    <div class="zoom-controls">
      <button id="zoomOut" title="縮小">－</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button id="zoomIn" title="拡大">＋</button>
      <button id="zoomReset" title="リセット">⟲</button>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>新しいタスクのゴールは？</h3>
    <input type="text" id="modalInput" placeholder="例: 引っ越し準備を終わらせる" maxlength="60">
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn-confirm" id="modalConfirm">作成する</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "taskmap_v1_tasks";
  var ACTIVE_KEY = "taskmap_v1_active";
  var SIDEBAR_KEY = "taskmap_v1_sidebar_collapsed";
  var LEVEL_COLORS = ["#ff2d78","#00e5c8","#c6ff3d","#9b4dff","#ff6b4a","#ffe135"];

  var state = {
    tasks: [],
    activeId: null
  };

  function uid(){
    if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
  }

  function load(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      state.tasks = raw ? JSON.parse(raw) : [];
    }catch(e){ state.tasks = []; }
    state.activeId = localStorage.getItem(ACTIVE_KEY) || null;
    if(state.activeId && !state.tasks.find(function(t){return t.id===state.activeId;})){
      state.activeId = null;
    }
    if(!state.activeId && state.tasks.length){
      state.activeId = state.tasks.slice().sort(function(a,b){return b.updatedAt-a.updatedAt;})[0].id;
    }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
    if(state.activeId) localStorage.setItem(ACTIVE_KEY, state.activeId);
  }

  function getActiveTask(){
    return state.tasks.find(function(t){ return t.id === state.activeId; }) || null;
  }

  function findNode(node, id){
    if(node.id === id) return node;
    for(var i=0;i<node.children.length;i++){
      var found = findNode(node.children[i], id);
      if(found) return found;
    }
    return null;
  }

  function findParent(node, id, parent){
    if(node.id === id) return parent;
    for(var i=0;i<node.children.length;i++){
      var found = findParent(node.children[i], id, node);
      if(found) return found;
    }
    return null;
  }

  function findPath(node, id, path){
    path = path || [];
    path.push(node);
    if(node.id === id) return path.slice();
    for(var i=0;i<node.children.length;i++){
      var res = findPath(node.children[i], id, path);
      if(res) return res;
    }
    path.pop();
    return null;
  }

  function countNodes(node, acc){
    acc = acc || {total:0, done:0};
    acc.total++;
    if(node.done) acc.done++;
    node.children.forEach(function(c){ countNodes(c, acc); });
    return acc;
  }

  function timeAgo(ts){
    var diff = Date.now() - ts;
    var min = Math.floor(diff/60000);
    if(min < 1) return "たった今";
    if(min < 60) return min + "分前";
    var hr = Math.floor(min/60);
    if(hr < 24) return hr + "時間前";
    var day = Math.floor(hr/24);
    if(day < 7) return day + "日前";
    var d = new Date(ts);
    return (d.getMonth()+1) + "/" + d.getDate();
  }

  /* ===== rendering ===== */

  function renderSidebar(){
    var list = document.getElementById("recentList");
    list.innerHTML = "";
    var sorted = state.tasks.slice().sort(function(a,b){ return b.updatedAt - a.updatedAt; });
    if(!sorted.length){
      var empty = document.createElement("div");
      empty.className = "recent-empty";
      empty.textContent = "まだタスクがありません。「＋ 新規タスク」から始めましょう。";
      list.appendChild(empty);
      return;
    }
    sorted.forEach(function(task){
      var counts = countNodes(task.root);
      var item = document.createElement("div");
      item.className = "recent-item" + (task.id === state.activeId ? " active" : "");
      var color = counts.total>0 && counts.done===counts.total ? "#c6ff3d" : "#00e5c8";
      item.innerHTML =
        '<span class="recent-dot" style="background:'+color+'"></span>' +
        '<span class="recent-info">' +
          '<div class="recent-title"></div>' +
          '<div class="recent-meta">'+counts.done+'/'+counts.total+' 完了 ・ '+timeAgo(task.updatedAt)+'</div>' +
        '</span>' +
        '<button class="recent-del" title="削除">✕</button>';
      item.querySelector(".recent-title").textContent = task.title;
      item.addEventListener("click", function(e){
        if(e.target.closest(".recent-del")) return;
        state.activeId = task.id;
        save();
        renderAll();
      });
      item.querySelector(".recent-del").addEventListener("click", function(e){
        e.stopPropagation();
        if(confirm('「'+task.title+'」を削除しますか？この操作は取り消せません。')){
          state.tasks = state.tasks.filter(function(t){ return t.id !== task.id; });
          if(state.activeId === task.id){
            state.activeId = state.tasks.length ? state.tasks.slice().sort(function(a,b){return b.updatedAt-a.updatedAt;})[0].id : null;
          }
          save();
          renderAll();
        }
      });
      list.appendChild(item);
    });
  }

  function buildNodeLi(node, task, depth){
    var li = document.createElement("li");
    if(node.collapsed) li.classList.add("collapsed");

    var wrap = document.createElement("div");
    wrap.className = "node-wrap";

    var card = document.createElement("div");
    card.className = "node-card" + (node.done ? " done" : "") + (task.currentNodeId === node.id ? " current" : "");
    card.style.background = LEVEL_COLORS[depth % LEVEL_COLORS.length];

    if(task.currentNodeId === node.id){
      var pin = document.createElement("div");
      pin.className = "pin-badge";
      pin.textContent = "📍";
      pin.title = "現在地";
      card.appendChild(pin);
    }

    var textEl = document.createElement("div");
    textEl.className = "node-text";
    textEl.contentEditable = "true";
    textEl.spellcheck = false;
    textEl.textContent = node.text;
    textEl.addEventListener("blur", function(){
      var v = textEl.textContent.trim();
      node.text = v || "(無題のステップ)";
      textEl.textContent = node.text;
      task.updatedAt = Date.now();
      save();
      renderSidebar();
      renderTopbar(task);
    });
    textEl.addEventListener("keydown", function(e){
      if(e.key === "Enter"){ e.preventDefault(); textEl.blur(); }
    });
    card.appendChild(textEl);
    wrap.appendChild(card);

    if(node.children.length){
      var toggle = document.createElement("div");
      toggle.className = "collapse-toggle";
      toggle.textContent = node.collapsed ? "＋" : "－";
      toggle.title = node.collapsed ? "展開" : "折りたたむ";
      toggle.addEventListener("click", function(){
        node.collapsed = !node.collapsed;
        save();
        renderCanvas();
      });
      wrap.appendChild(toggle);
    }

    var actions = document.createElement("div");
    actions.className = "node-actions";

    var addBtn = document.createElement("button");
    addBtn.className = "node-btn";
    addBtn.textContent = "＋";
    addBtn.title = "子ステップを追加";
    addBtn.addEventListener("click", function(){
      showAddChildInput(wrap, node, task);
    });
    actions.appendChild(addBtn);

    var doneBtn = document.createElement("button");
    doneBtn.className = "node-btn";
    doneBtn.textContent = "✓";
    doneBtn.title = "完了にする / 戻す";
    doneBtn.addEventListener("click", function(){
      node.done = !node.done;
      task.updatedAt = Date.now();
      save();
      renderAll();
    });
    actions.appendChild(doneBtn);

    var pinBtn = document.createElement("button");
    pinBtn.className = "node-btn";
    pinBtn.textContent = "📍";
    pinBtn.title = "ここを現在地にする";
    pinBtn.addEventListener("click", function(){
      task.currentNodeId = node.id;
      task.updatedAt = Date.now();
      save();
      renderAll();
    });
    actions.appendChild(pinBtn);

    if(depth > 0){
      var delBtn = document.createElement("button");
      delBtn.className = "node-btn danger";
      delBtn.textContent = "🗑";
      delBtn.title = "このステップを削除";
      delBtn.addEventListener("click", function(){
        if(confirm('「'+node.text+'」とその下のステップをすべて削除しますか？')){
          var parent = findParent(task.root, node.id, null);
          if(parent){
            parent.children = parent.children.filter(function(c){ return c.id !== node.id; });
            if(task.currentNodeId === node.id) task.currentNodeId = task.root.id;
            task.updatedAt = Date.now();
            save();
            renderAll();
          }
        }
      });
      actions.appendChild(delBtn);
    }

    wrap.appendChild(actions);
    li.appendChild(wrap);

    if(node.children.length && !node.collapsed){
      var ul = document.createElement("ul");
      node.children.forEach(function(child){
        ul.appendChild(buildNodeLi(child, task, depth+1));
      });
      li.appendChild(ul);
    }

    return li;
  }

  function showAddChildInput(wrap, node, task){
    var existing = wrap.querySelector(".add-child-input");
    if(existing){ existing.querySelector("input").focus(); return; }
    var box = document.createElement("div");
    box.className = "add-child-input";
    box.innerHTML = '<input type="text" placeholder="次にやること" maxlength="60"><button>追加</button>';
    var input = box.querySelector("input");
    var btn = box.querySelector("button");
    function commit(){
      var v = input.value.trim();
      if(v){
        node.children.push({ id: uid(), text: v, done:false, collapsed:false, children:[] });
        node.collapsed = false;
        task.updatedAt = Date.now();
        save();
        renderAll();
      } else {
        box.remove();
      }
    }
    btn.addEventListener("click", commit);
    input.addEventListener("keydown", function(e){
      if(e.key === "Enter") commit();
      if(e.key === "Escape") box.remove();
    });
    wrap.appendChild(box);
    input.focus();
  }

  function renderTopbar(task){
    var topbar = document.getElementById("topbar");
    if(!task){ topbar.style.display = "none"; return; }
    topbar.style.display = "block";

    var titleEl = document.getElementById("taskTitle");
    titleEl.textContent = task.title;
    titleEl.onblur = function(){
      var v = titleEl.textContent.trim();
      task.title = v || "無題のタスク";
      titleEl.textContent = task.title;
      task.updatedAt = Date.now();
      save();
      renderSidebar();
    };
    titleEl.onkeydown = function(e){
      if(e.key === "Enter"){ e.preventDefault(); titleEl.blur(); }
    };

    var counts = countNodes(task.root);
    document.getElementById("progressLabel").textContent = counts.done + " / " + counts.total + " 完了";
    var pct = counts.total ? Math.round(counts.done/counts.total*100) : 0;
    document.getElementById("progressFill").style.width = pct + "%";

    var trailEl = document.getElementById("currentTrail");
    var path = findPath(task.root, task.currentNodeId);
    if(path && path.length){
      trailEl.innerHTML = '<b>現在地 📍</b>';
      path.forEach(function(n, i){
        var seg = document.createElement("span");
        seg.className = "trail-seg";
        seg.textContent = n.text;
        trailEl.appendChild(seg);
        if(i < path.length-1){
          var arrow = document.createElement("span");
          arrow.textContent = "→";
          trailEl.appendChild(arrow);
        }
      });
    } else {
      trailEl.innerHTML = "";
    }
  }

  function renderCanvas(){
    var task = getActiveTask();
    var emptyState = document.getElementById("emptyState");
    var treeRoot = document.getElementById("treeRoot");

    if(!task){
      emptyState.style.display = "flex";
      treeRoot.style.display = "none";
      return;
    }
    emptyState.style.display = "none";
    treeRoot.style.display = "flex";
    treeRoot.innerHTML = "";
    treeRoot.appendChild(buildNodeLi(task.root, task, 0));
    applyZoom();
  }

  function renderAll(){
    var task = getActiveTask();
    renderSidebar();
    renderTopbar(task);
    renderCanvas();
  }

  /* ===== new task modal ===== */

  function openModal(){
    document.getElementById("modalOverlay").classList.add("open");
    var input = document.getElementById("modalInput");
    input.value = "";
    setTimeout(function(){ input.focus(); }, 50);
  }
  function closeModal(){
    document.getElementById("modalOverlay").classList.remove("open");
  }
  function confirmNewTask(){
    var input = document.getElementById("modalInput");
    var v = input.value.trim();
    if(!v) { input.focus(); return; }
    var rootId = uid();
    var task = {
      id: uid(),
      title: v,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      currentNodeId: rootId,
      root: { id: rootId, text: v, done:false, collapsed:false, children:[] }
    };
    state.tasks.push(task);
    state.activeId = task.id;
    save();
    closeModal();
    renderAll();
  }

  /* ===== sidebar collapse/expand (works at any screen size) ===== */
  function setSidebarCollapsed(collapsed){
    document.body.classList.toggle("sidebar-collapsed", collapsed);
    localStorage.setItem(SIDEBAR_KEY, collapsed ? "1" : "0");
  }
  function initSidebarState(){
    var stored = localStorage.getItem(SIDEBAR_KEY);
    var collapsed = stored !== null ? stored === "1" : window.innerWidth <= 760;
    setSidebarCollapsed(collapsed);
  }

  /* ===== zoom (trackpad pinch via ctrl+wheel, plus buttons) ===== */
  var zoomLevel = 1;
  var ZOOM_MIN = 0.4, ZOOM_MAX = 2.2, ZOOM_STEP = 0.1;

  function clamp(v, min, max){ return Math.min(max, Math.max(min, v)); }

  function applyZoom(){
    var treeRoot = document.getElementById("treeRoot");
    // 'zoom' (not transform) is used so the scrollable area of .canvas-wrap
    // grows/shrinks with the content, keeping trackpad/scrollbar panning
    // correct at any zoom level. Supported in Chrome/Edge/Safari, and in
    // Firefox since v126 (2024).
    treeRoot.style.zoom = zoomLevel;
    document.getElementById("zoomLabel").textContent = Math.round(zoomLevel * 100) + "%";
  }

  function setZoom(v){
    zoomLevel = clamp(v, ZOOM_MIN, ZOOM_MAX);
    applyZoom();
  }

  /* ===== init ===== */
  document.getElementById("newTaskBtn").addEventListener("click", openModal);
  document.getElementById("modalCancel").addEventListener("click", closeModal);
  document.getElementById("modalConfirm").addEventListener("click", confirmNewTask);
  document.getElementById("modalInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") confirmNewTask();
    if(e.key === "Escape") closeModal();
  });
  document.getElementById("modalOverlay").addEventListener("click", function(e){
    if(e.target.id === "modalOverlay") closeModal();
  });

  document.getElementById("sidebarCollapseBtn").addEventListener("click", function(){ setSidebarCollapsed(true); });
  document.getElementById("sidebarReopenBtn").addEventListener("click", function(){ setSidebarCollapsed(false); });

  document.getElementById("homeLink").addEventListener("click", function(){
    state.activeId = null;
    renderAll();
  });

  document.getElementById("deleteAllBtn").addEventListener("click", function(){
    if(!state.tasks.length) return;
    if(confirm("すべてのタスクを削除しますか？この操作は取り消せません。")){
      state.tasks = [];
      state.activeId = null;
      save();
      renderAll();
    }
  });

  document.getElementById("zoomIn").addEventListener("click", function(){ setZoom(zoomLevel + ZOOM_STEP); });
  document.getElementById("zoomOut").addEventListener("click", function(){ setZoom(zoomLevel - ZOOM_STEP); });
  document.getElementById("zoomReset").addEventListener("click", function(){ setZoom(1); });

  document.getElementById("canvasWrap").addEventListener("wheel", function(e){
    // Trackpad pinch gestures are reported by browsers as wheel events
    // with ctrlKey set to true (this is the standard cross-browser way
    // to detect pinch-to-zoom on a trackpad).
    if(e.ctrlKey){
      e.preventDefault();
      setZoom(zoomLevel - e.deltaY * 0.01);
    }
  }, { passive:false });

  window.addEventListener("keydown", function(e){
    if((e.ctrlKey || e.metaKey) && (e.key === "+" || e.key === "=")){ e.preventDefault(); setZoom(zoomLevel + ZOOM_STEP); }
    if((e.ctrlKey || e.metaKey) && e.key === "-"){ e.preventDefault(); setZoom(zoomLevel - ZOOM_STEP); }
    if((e.ctrlKey || e.metaKey) && e.key === "0"){ e.preventDefault(); setZoom(1); }
  });

  initSidebarState();
  load();
  renderAll();
})();
</script>
</body>
</html>
